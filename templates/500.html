<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - HygionX Health Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full text-center">
        <div class="mb-8">
            <h1 class="text-9xl font-bold text-red-300">500</h1>
        </div>
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Server Error</h2>
            <p class="text-gray-600">Something went wrong on our end. Please try again later.</p>
        </div>
        <div class="space-y-4">
            <button onclick="window.location.reload()" class="inline-block bg-indigo-600 text-white px-6 py-3 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                Try Again
            </button>
            <div>
                <a href="/" class="text-indigo-600 hover:text-indigo-500">
                    Go to Homepage
                </a>
            </div>
        </div>
    </div>
</body>
</html>
